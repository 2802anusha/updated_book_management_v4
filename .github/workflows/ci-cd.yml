name: Book Management CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Server/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -c "from app import init_db; init_db()"
      - run: python -m pytest tests/pytest -v --json-report --json-report-file=tests/pytest/pytest-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report
          path: Server/tests/pytest/pytest-report.json

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Client/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: Client/dist

  playwright-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Server/requirements.txt
      - name: Install backend & seed DB
        working-directory: Server
        run: |
          pip install -r requirements.txt
          python -c "from app import init_db; init_db()"
          python -c "import sqlite3; conn = sqlite3.connect('data/books.db'); conn.execute('INSERT INTO book (publisher, name, date, cost) VALUES (?, ?, ?, ?)', ('CI Publisher', 'CI Book', '2026-06-01', 99.99)); conn.commit()"
      - name: Start Flask backend
        working-directory: Server
        env:
          JWT_SECRET_KEY: "ci-secret-key-must-be-32-chars-long!!"
          BOOKS_DB_PATH: "data/books.db"
        run: flask --app app run --host 127.0.0.1 --port 5001 &
      - name: Wait for backend
        run: |
          for i in {1..30}; do curl -fsS http://127.0.0.1:5001/health && exit 0; sleep 2; done; exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Client/package-lock.json
      - name: Install frontend deps & serve build
        working-directory: Client
        run: |
          npm ci
          npx serve -s dist -l 5173 &
      - name: Wait for frontend
        run: |
          for i in {1..30}; do curl -fsS http://127.0.0.1:5173 && exit 0; sleep 2; done; exit 1
      - name: Install Playwright browsers
        working-directory: Client
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: Client
        env:
          BASE_URL: http://localhost:5173
        run: npx playwright test --workers=1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: Client/playwright-report

  package-artifacts:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, playwright-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: release/react-dist
      - uses: actions/upload-artifact@v4
        with:
          name: book-management-release
          path: release